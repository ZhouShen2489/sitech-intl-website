[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_SITE_ORIGIN = "https://opera.sitech-intl.com"
  NEXT_PUBLIC_COMPANY_ORIGIN = "https://www.sitech-intl.com"
  NEXT_PUBLIC_TELECOM_ORIGIN = "https://telecom.sitech-intl.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
